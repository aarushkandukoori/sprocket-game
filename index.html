<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprocket's Journey Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#160f33; --bg-2:#2a1b52; --bg-3:#3d2566;
    --panel:#241a4a; --panel-2:#2e2257; --line:#473a73;
    --ink:#f6f1ff; --ink-soft:#c7bce8;
    --amber:#ffb454; --amber-deep:#ff9233;
    --teal:#4fd1c5; --pink:#ff7eb6; --purple:#b58cff;
    --tree:#2f9e6b; --tree-2:#1f6e49;
    --floor-1:#3a2f63; --floor-2:#332858;
    --gold:#ffd86b;
    --shadow:0 14px 34px rgba(10,5,30,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    min-height:100vh;
    background:
      radial-gradient(900px 500px at 15% -5%, rgba(181,140,255,.28), transparent 60%),
      radial-gradient(800px 600px at 90% 10%, rgba(79,209,197,.20), transparent 55%),
      radial-gradient(700px 700px at 50% 120%, rgba(255,180,84,.16), transparent 60%),
      linear-gradient(160deg,var(--bg-1),var(--bg-2) 55%,var(--bg-3));
    background-attachment:fixed;
    overflow-x:hidden;
  }
  /* drifting fireflies */
  .sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .fly{position:absolute;width:5px;height:5px;border-radius:50%;
    background:radial-gradient(circle,#fff4cf,rgba(255,216,107,.4));
    box-shadow:0 0 8px 2px rgba(255,216,107,.6);animation:drift linear infinite}
  @keyframes drift{0%{transform:translate(0,0);opacity:0}
    10%{opacity:.9}90%{opacity:.9}100%{transform:translate(40px,-120px);opacity:0}}

  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:22px 16px 60px}

  header.top{text-align:center;margin-bottom:14px}
  .title{font-family:'Fredoka',sans-serif;font-weight:700;
    font-size:clamp(30px,6vw,52px);line-height:1;margin:4px 0 2px;
    letter-spacing:.5px;
    background:linear-gradient(90deg,var(--amber),var(--pink) 60%,var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 3px 0 rgba(0,0,0,.18))}
  .subtitle{color:var(--ink-soft);font-weight:700;font-size:clamp(13px,2.4vw,16px);margin:0}

  /* chapter pills */
  .chapters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0 6px}
  .chip-ch{display:flex;align-items:center;gap:8px;border:2px solid var(--line);
    background:var(--panel);color:var(--ink-soft);font-family:'Fredoka',sans-serif;
    font-weight:600;font-size:14px;padding:8px 14px;border-radius:30px;cursor:pointer;
    transition:transform .15s, border-color .2s, color .2s, background .2s}
  .chip-ch:hover{transform:translateY(-2px)}
  .chip-ch .num{display:grid;place-items:center;width:24px;height:24px;border-radius:50%;
    background:var(--line);color:var(--ink);font-size:13px;font-weight:700}
  .chip-ch.active{border-color:var(--amber);color:var(--ink);
    background:linear-gradient(180deg,var(--panel-2),var(--panel));box-shadow:0 0 0 3px rgba(255,180,84,.18)}
  .chip-ch.active .num{background:var(--amber);color:#3a1e00}
  .chip-ch.locked{opacity:.45;cursor:not-allowed}
  .chip-ch.done .num::after{content:"✓"}
  .chip-ch.done .num{font-size:0}

  .board-grid{display:grid;grid-template-columns:1fr;gap:18px;margin-top:14px}
  @media(min-width:880px){.board-grid{grid-template-columns:minmax(0,1fr) 360px}}

  .card{background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:2px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:18px}

  /* story box */
  .story{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
  .story .face{font-size:34px;line-height:1;flex:0 0 auto;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.35));animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-4px)}}
  .story .bubble{background:var(--panel);border:2px solid var(--line);border-radius:16px;
    padding:10px 14px;font-size:15px;line-height:1.45;position:relative}
  .story .bubble b{color:var(--amber)}
  .story .tag{display:inline-block;font-family:'Fredoka',sans-serif;font-size:11px;
    letter-spacing:.6px;text-transform:uppercase;color:#3a1e00;background:var(--teal);
    padding:2px 9px;border-radius:20px;margin-bottom:6px;font-weight:600}

  /* the forest board */
  .board-shell{display:flex;justify-content:center}
  .board{position:relative;border-radius:18px;
    background:
      repeating-linear-gradient(45deg,rgba(255,255,255,.02) 0 10px,transparent 10px 20px),
      radial-gradient(circle at 30% 20%,rgba(79,209,197,.10),transparent 60%),
      linear-gradient(180deg,#241a47,#1c1438);
    box-shadow:inset 0 0 0 2px var(--line), inset 0 8px 30px rgba(0,0,0,.4)}
  .tile{position:absolute;border-radius:12px;display:grid;place-items:center;font-size:26px;
    transition:transform .2s}
  .tile.floor{background:linear-gradient(180deg,var(--floor-1),var(--floor-2));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05), inset 0 -3px 0 rgba(0,0,0,.25)}
  .tile.tree{background:linear-gradient(180deg,var(--tree),var(--tree-2));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), 0 4px 0 rgba(0,0,0,.25)}
  .tile.home{background:radial-gradient(circle,rgba(255,216,107,.35),rgba(58,47,99,.6));
    box-shadow:inset 0 0 0 2px var(--gold), 0 0 22px rgba(255,216,107,.4);
    animation:homeglow 2s ease-in-out infinite}
  @keyframes homeglow{50%{box-shadow:inset 0 0 0 2px var(--gold),0 0 34px rgba(255,216,107,.7)}}
  .tile .battery{filter:drop-shadow(0 0 6px rgba(79,209,197,.8));animation:bob 1.8s ease-in-out infinite}

  /* Sprocket */
  .sprocket{position:absolute;display:grid;place-items:center;
    transition:transform .4s cubic-bezier(.34,1.4,.5,1);z-index:5}
  .bot-inner{width:78%;height:78%;display:grid;place-items:center}
  .bot-inner.bonk{animation:bonk .45s ease}
  @keyframes bonk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px) rotate(-8deg)}
    40%{transform:translateX(7px) rotate(8deg)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  .spark{position:absolute;font-size:22px;pointer-events:none;z-index:8;animation:spark .7s ease forwards}
  @keyframes spark{0%{transform:translateY(0) scale(.4);opacity:1}
    100%{transform:translateY(-34px) scale(1.3);opacity:0}}

  /* command palette */
  .panel-h{font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;
    text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);margin:0 0 10px;
    display:flex;align-items:center;gap:8px}
  .palette{display:flex;flex-wrap:wrap;gap:9px}
  .cmd{display:flex;align-items:center;gap:8px;border:none;cursor:pointer;
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;color:#241a3f;
    padding:11px 13px;border-radius:14px;box-shadow:0 4px 0 rgba(0,0,0,.25);
    transition:transform .1s, box-shadow .1s; user-select:none}
  .cmd:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
  .cmd .ic{font-size:18px}
  .cmd[disabled]{opacity:.35;cursor:not-allowed;filter:grayscale(.5)}
  .cmd.t-move{background:linear-gradient(180deg,#7df0e5,var(--teal))}
  .cmd.t-turn{background:linear-gradient(180deg,#ffd08a,var(--amber))}
  .cmd.t-loop{background:linear-gradient(180deg,#ffb0d6,var(--pink))}
  .cmd.t-if{background:linear-gradient(180deg,#d3b6ff,var(--purple))}

  /* program list */
  .program{min-height:120px;background:rgba(0,0,0,.18);border:2px dashed var(--line);
    border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:8px}
  .empty-hint{color:var(--ink-soft);font-style:italic;font-size:14px;text-align:center;
    margin:auto;opacity:.85}
  .node{display:flex;align-items:center;gap:8px;font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:14px;padding:9px 11px;border-radius:12px;color:#241a3f}
  .node.running{outline:3px solid #fff;outline-offset:1px;animation:pulse .4s}
  @keyframes pulse{from{transform:scale(1.06)}to{transform:scale(1)}}
  .node .x{margin-left:auto;background:rgba(0,0,0,.25);color:#fff;border:none;width:22px;height:22px;
    border-radius:50%;cursor:pointer;font-size:14px;line-height:1;display:grid;place-items:center}
  .n-move{background:linear-gradient(180deg,#7df0e5,var(--teal))}
  .n-turn{background:linear-gradient(180deg,#ffd08a,var(--amber))}
  .n-if{background:linear-gradient(180deg,#d3b6ff,var(--purple))}
  .loop{border:2px solid var(--pink);border-radius:14px;padding:8px;background:rgba(255,126,182,.10)}
  .loop.active{box-shadow:0 0 0 3px rgba(255,126,182,.4)}
  .loop-head{display:flex;align-items:center;gap:8px;font-family:'Fredoka',sans-serif;
    font-weight:600;font-size:14px;color:var(--pink)}
  .loop-head .x{margin-left:auto}
  .stepper{display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.25);
    border-radius:20px;padding:2px}
  .stepper button{width:24px;height:24px;border:none;border-radius:50%;cursor:pointer;
    background:var(--pink);color:#3a0e23;font-weight:700;font-size:15px;line-height:1}
  .stepper .cnt{min-width:22px;text-align:center;color:#fff;font-weight:800}
  .loop-body{margin:8px 0 4px;padding-left:14px;border-left:3px solid rgba(255,126,182,.4);
    display:flex;flex-direction:column;gap:7px;min-height:8px}
  .loop-body .mini{color:var(--ink-soft);font-style:italic;font-size:12px;opacity:.7}
  .close-loop{align-self:flex-start;margin-top:6px;background:var(--pink);color:#3a0e23;border:none;
    font-family:'Fredoka',sans-serif;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer}

  .controls{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .btn{flex:1;min-width:120px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;
    border:none;border-radius:16px;padding:13px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.3);
    transition:transform .1s, box-shadow .1s}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.3)}
  .btn.run{background:linear-gradient(180deg,#8be37a,#46b94a);color:#0c2a0c}
  .btn.reset{background:var(--panel);color:var(--ink);box-shadow:0 5px 0 rgba(0,0,0,.4);border:2px solid var(--line)}
  .btn.hint{background:linear-gradient(180deg,#ffd08a,var(--amber));color:#3a1e00;flex:0 0 auto;min-width:0}
  .btn[disabled]{opacity:.5;cursor:not-allowed}

  .status{margin-top:12px;min-height:22px;text-align:center;font-weight:700;font-size:15px}
  .status.good{color:#9be88a}.status.bad{color:#ff9aa2}.status.info{color:var(--ink-soft)}

  .hint-box{margin-top:10px;background:rgba(255,180,84,.12);border:1px solid var(--amber);
    border-radius:12px;padding:10px 12px;font-size:14px;display:none}
  .hint-box.show{display:block}
  .hint-box b{color:var(--amber)}

  /* win overlay */
  .overlay{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    background:rgba(12,7,28,.7);backdrop-filter:blur(4px)}
  .overlay.show{display:flex}
  .win-card{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:2px solid var(--amber);
    border-radius:24px;padding:30px 26px;max-width:380px;text-align:center;box-shadow:var(--shadow);
    animation:pop .4s cubic-bezier(.34,1.5,.5,1)}
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .win-card .big{font-size:56px;margin-bottom:6px;animation:bob 1.4s ease-in-out infinite}
  .win-card h2{font-family:'Fredoka',sans-serif;margin:4px 0;font-size:26px;color:var(--gold)}
  .win-card .learned{background:rgba(79,209,197,.14);border-radius:12px;padding:10px;margin:14px 0;
    font-size:14px;color:var(--ink)}
  .win-card .learned b{color:var(--teal)}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;z-index:41;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg)}}
  footer.tiny{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:26px;opacity:.7}
</style>
</head>
<body>
<div class="sky" id="sky"></div>
<div class="wrap">
  <header class="top">
    <p class="subtitle">🦊 A coding adventure 🌲</p>
    <h1 class="title">Sprocket's Journey Home</h1>
  </header>

  <nav class="chapters" id="chapters"></nav>

  <div class="board-grid">
    <!-- LEFT: story + forest -->
    <section class="card">
      <div class="story">
        <div class="face" id="story-face">🦊</div>
        <div class="bubble">
          <span class="tag" id="concept-tag">Sequencing</span>
          <div id="story-text"></div>
        </div>
      </div>
      <div class="board-shell">
        <div class="board" id="board"></div>
      </div>
      <div class="status info" id="status">Build Sprocket's code, then press <b>Run</b>! 🚀</div>
    </section>

    <!-- RIGHT: coding panel -->
    <section class="card">
      <h3 class="panel-h">🧩 Command Blocks</h3>
      <div class="palette" id="palette"></div>

      <h3 class="panel-h" style="margin-top:18px">📜 Sprocket's Code <span id="active-flag" style="color:var(--pink);font-size:12px;text-transform:none;letter-spacing:0"></span></h3>
      <div class="program" id="program"></div>

      <div class="controls">
        <button class="btn run" id="runBtn">▶ Run</button>
        <button class="btn reset" id="resetBtn">↺ Clear</button>
        <button class="btn hint" id="hintBtn">💡</button>
      </div>
      <div class="hint-box" id="hintBox"></div>
    </section>
  </div>
  <footer class="tiny">Tip for grown-ups: each chapter adds one new idea. Let kids fail freely — bonking into trees is how the logic clicks. 🌲</footer>
</div>

<div class="overlay" id="overlay">
  <div class="win-card">
    <div class="big" id="winEmoji">🎉</div>
    <h2 id="winTitle">You did it!</h2>
    <p id="winMsg"></p>
    <div class="learned" id="winLearned"></div>
    <button class="btn run" id="nextBtn" style="box-shadow:0 5px 0 rgba(0,0,0,.3)">Next Chapter →</button>
  </div>
</div>

<script>
/* ---------- fireflies ---------- */
const sky=document.getElementById('sky');
for(let i=0;i<22;i++){const f=document.createElement('div');f.className='fly';
  f.style.left=Math.random()*100+'%';f.style.top=(60+Math.random()*40)+'%';
  f.style.animationDuration=(6+Math.random()*7)+'s';f.style.animationDelay=(-Math.random()*8)+'s';
  sky.appendChild(f);}

/* ---------- level data ---------- */
const DIRS=['N','E','S','W'];
const VEC={N:[0,-1],E:[1,0],S:[0,1],W:[-1,0]};
const LEVELS=[
  {
    name:"The Long Way Home", concept:"Sequencing", face:"🦊",
    story:"Sprocket the robot fox wandered too far into the forest! Her cozy den (the glowing <b>🏠</b>) is just over there. Give her steps <b>in the right order</b> to lead her home.",
    grid:["S...","###.","....",".##.","H..."], start:{x:0,y:0,dir:'E'},
    cmds:['move','left','right'],
    hint:"Sprocket faces ➡️ to start. Try: <b>Step ×3</b>, then <b>Turn Right</b>, then <b>Step ×4</b>, then <b>Turn Right</b>, then <b>Step ×3</b>.",
    learned:"the order of instructions matters — that's a <b>sequence</b>, the most basic idea in all of coding!"
  },
  {
    name:"The Winding Staircase", concept:"Loops", face:"🦊",
    story:"This staircase repeats the SAME pattern again and again. You <i>could</i> type every step... or you could be clever and use a <b>🔁 Repeat</b> loop to do it for you. Grab the 🔋 batteries on the way!",
    grid:["S.###","#..##","##B.#","###.B","####H"], start:{x:0,y:0,dir:'E'},
    cmds:['move','left','right','repeat'],
    hint:"Each stair is the same: <b>Step, Turn Right, Step, Turn Left</b>. Put those 4 blocks inside a <b>🔁 Repeat ×4</b> loop!",
    learned:"a <b>loop</b> repeats instructions so you don't have to write them over and over. Loops save coders huge amounts of work!"
  },
  {
    name:"The Tangled Thicket", concept:"Conditionals", face:"🦊",
    story:"The path twists like a snail's shell! Instead of memorizing every turn, teach Sprocket ONE smart rule: <b>🌲❓ If a tree blocks me → turn right</b>. Wrap it in a loop and watch her find her own way!",
    grid:["S....","####.","..H#B","B###.","....."], start:{x:0,y:0,dir:'E'},
    cmds:['move','left','right','repeat','ifwall'],
    hint:"Inside a <b>🔁 Repeat ×16</b> loop, put: <b>If Tree Ahead → Turn Right</b>, then <b>Step</b>. That tiny rule solves the whole spiral!",
    learned:"a <b>conditional</b> (an \"if\" rule) lets a program make decisions on its own. Loops + conditionals = code that can handle anything!"
  }
];

const CMD_META={
  move:{cls:'t-move',ncls:'n-move',ic:'👣',label:'Step'},
  left:{cls:'t-turn',ncls:'n-turn',ic:'↺',label:'Turn Left'},
  right:{cls:'t-turn',ncls:'n-turn',ic:'↻',label:'Turn Right'},
  repeat:{cls:'t-loop',ic:'🔁',label:'Repeat'},
  ifwall:{cls:'t-if',ncls:'n-if',ic:'🌲❓',label:'If Tree → Turn Right'}
};

/* ---------- state ---------- */
let lvl=0, unlocked=0, uid=0;
let program=[];          // array of nodes
let activeBlock='main';  // 'main' or repeat-node id
let running=false, won=false;
let bot={x:0,y:0,dir:'E'};
let grid=[], gridW=0, gridH=0;

const $=id=>document.getElementById(id);
const board=$('board'), programEl=$('program'), paletteEl=$('palette');

/* ---------- geometry ---------- */
let TILE=58, GAP=8;
function computeTile(){
  const shellW=Math.min(board.parentElement.clientWidth, 460);
  TILE=Math.floor((shellW-GAP*(gridW+1))/gridW);
  TILE=Math.max(40,Math.min(TILE,72));
}
function cellPos(x,y){return [GAP + x*(TILE+GAP), GAP + y*(TILE+GAP)];}

/* ---------- build a level ---------- */
function loadLevel(i){
  lvl=i; program=[]; activeBlock='main'; running=false; won=false;
  const L=LEVELS[i];
  grid=L.grid.map(r=>r.split('')); gridH=grid.length; gridW=grid[0].length;
  bot={...L.start};
  $('concept-tag').textContent=L.concept;
  $('story-text').innerHTML=L.story;
  $('story-face').textContent=L.face;
  $('hintBox').classList.remove('show');
  $('hintBox').innerHTML='<b>Hint:</b> '+L.hint;
  setStatus('info','Build Sprocket\u2019s code, then press <b>Run</b>! \uD83D\uDE80');
  buildPalette(L.cmds);
  computeTile(); renderBoard(); placeBot(false); renderProgram(); renderChapters();
}

function buildPalette(cmds){
  paletteEl.innerHTML='';
  cmds.forEach(c=>{
    const m=CMD_META[c];
    const b=document.createElement('button');
    b.className='cmd '+m.cls; b.dataset.cmd=c;
    b.innerHTML='<span class="ic">'+m.ic+'</span>'+m.label;
    b.onclick=()=>addCommand(c);
    paletteEl.appendChild(b);
  });
}

function renderBoard(){
  board.style.width=(gridW*(TILE+GAP)+GAP)+'px';
  board.style.height=(gridH*(TILE+GAP)+GAP)+'px';
  board.querySelectorAll('.tile,.sprocket,.spark').forEach(e=>e.remove());
  for(let y=0;y<gridH;y++)for(let x=0;x<gridW;x++){
    const ch=grid[y][x];
    const t=document.createElement('div');
    t.className='tile '+(ch==='#'?'tree':ch==='H'?'home':'floor');
    const [px,py]=cellPos(x,y);
    t.style.left=px+'px';t.style.top=py+'px';t.style.width=TILE+'px';t.style.height=TILE+'px';
    if(ch==='#')t.textContent='🌲';
    else if(ch==='H')t.textContent='🏠';
    else if(ch==='B')t.innerHTML='<span class="battery">🔋</span>';
    t.dataset.x=x;t.dataset.y=y;
    board.appendChild(t);
  }
  // sprocket element
  const s=document.createElement('div');
  s.className='sprocket';s.id='bot';
  s.style.width=TILE+'px';s.style.height=TILE+'px';
  s.innerHTML='<div class="bot-inner" id="botInner">'+botSVG()+'</div>';
  board.appendChild(s);
}

function botSVG(){
  // drawn facing EAST (nose to the right)
  return `<svg viewBox="0 0 64 64" width="100%" height="100%" style="overflow:visible">
    <ellipse cx="30" cy="56" rx="18" ry="5" fill="rgba(0,0,0,.3)"/>
    <polygon points="14,14 22,8 24,20" fill="#ff9233"/>
    <polygon points="44,14 50,9 46,22" fill="#ff9233"/>
    <rect x="14" y="16" width="34" height="30" rx="13" fill="#ffb454" stroke="#ff7a1a" stroke-width="2.5"/>
    <rect x="20" y="22" width="22" height="14" rx="7" fill="#241a4a"/>
    <circle cx="28" cy="29" r="3.4" fill="#7df0e5"/>
    <circle cx="38" cy="29" r="3.4" fill="#7df0e5"/>
    <polygon points="48,26 60,32 48,38" fill="#ff7eb6" stroke="#e0508f" stroke-width="1.5"/>
    <line x1="31" y1="16" x2="31" y2="7" stroke="#ff7a1a" stroke-width="2.5"/>
    <circle cx="31" cy="5" r="3" fill="#ffd86b"/>
  </svg>`;
}

const DIR_DEG={E:0,S:90,W:180,N:270};
function placeBot(animate){
  const s=$('bot'); if(!s)return;
  if(!animate)s.style.transition='none'; else s.style.transition='';
  const [px,py]=cellPos(bot.x,bot.y);
  s.style.transform=`translate(${px}px,${py}px) rotate(${DIR_DEG[bot.dir]}deg)`;
  if(!animate)void s.offsetWidth, s.style.transition='';
}

/* ---------- program building ---------- */
function getBlock(){ // returns array reference for active block
  if(activeBlock==='main')return program;
  const n=program.find(p=>p.id===activeBlock);
  return n?n.body:program;
}
function addCommand(type){
  if(running)return;
  if(type==='repeat'){
    if(activeBlock!=='main')return; // no nested loops for kids
    const node={id:++uid,type:'repeat',count:3,body:[]};
    program.push(node); activeBlock=node.id;
  } else {
    getBlock().push({id:++uid,type});
  }
  renderProgram();
}
function removeNode(id){
  if(running)return;
  // top level?
  let idx=program.findIndex(p=>p.id===id);
  if(idx>-1){ if(program[idx].type==='repeat'&&activeBlock===id)activeBlock='main'; program.splice(idx,1); renderProgram(); return;}
  for(const p of program){ if(p.type==='repeat'){const j=p.body.findIndex(b=>b.id===id); if(j>-1){p.body.splice(j,1);renderProgram();return;}}}
}
function changeCount(id,d){
  const n=program.find(p=>p.id===id); if(!n)return;
  n.count=Math.max(1,Math.min(20,n.count+d)); renderProgram();
}

function renderProgram(){
  programEl.innerHTML='';
  $('active-flag').textContent = activeBlock!=='main' ? '✏️ adding inside loop' : '';
  if(program.length===0){
    const e=document.createElement('div');e.className='empty-hint';
    e.textContent='Tap a command block to start building Sprocket\u2019s code →';
    programEl.appendChild(e); return;
  }
  program.forEach(n=>programEl.appendChild(renderNode(n)));
}
function renderNode(n){
  if(n.type==='repeat'){
    const wrap=document.createElement('div');
    wrap.className='loop'+(activeBlock===n.id?' active':'');
    const head=document.createElement('div');head.className='loop-head';
    head.innerHTML=`🔁 Repeat
      <span class="stepper"><button>−</button><span class="cnt">${n.count}</span><button>+</button></span> times`;
    const [minus,plus]=head.querySelectorAll('.stepper button');
    minus.onclick=()=>changeCount(n.id,-1); plus.onclick=()=>changeCount(n.id,1);
    const x=document.createElement('button');x.className='x';x.textContent='✕';
    x.onclick=()=>removeNode(n.id); head.appendChild(x);
    wrap.appendChild(head);
    const body=document.createElement('div');body.className='loop-body';
    if(n.body.length===0){const m=document.createElement('div');m.className='mini';
      m.textContent='(empty — add blocks here)';body.appendChild(m);}
    else n.body.forEach(b=>body.appendChild(renderNode(b)));
    wrap.appendChild(body);
    if(activeBlock===n.id){
      const c=document.createElement('button');c.className='close-loop';c.textContent='✓ Done with loop';
      c.onclick=()=>{activeBlock='main';renderProgram();};
      wrap.appendChild(c);
    }
    wrap.dataset.id=n.id;
    return wrap;
  }
  const m=CMD_META[n.type];
  const d=document.createElement('div');d.className='node '+m.ncls;d.dataset.id=n.id;
  d.innerHTML='<span>'+m.ic+'</span>'+m.label;
  const x=document.createElement('button');x.className='x';x.textContent='✕';
  x.onclick=()=>removeNode(n.id); d.appendChild(x);
  return d;
}

/* ---------- compile + run ---------- */
function flatten(list){
  const out=[];
  for(const n of list){
    if(n.type==='repeat'){for(let i=0;i<n.count;i++)out.push(...flatten(n.body));}
    else out.push(n);
  }
  return out;
}
function tileAt(x,y){ if(x<0||y<0||x>=gridW||y>=gridH)return '#'; return grid[y][x]; }
function isWall(x,y){ return tileAt(x,y)==='#'; }

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function run(){
  if(running)return;
  const ops=flatten(program).map(n=>n.type);
  if(ops.length===0){setStatus('bad','Add some blocks first! 🧩');return;}
  running=true; won=false; lockUI(true);
  // reset bot to start
  bot={...LEVELS[lvl].start}; renderBoard(); placeBot(false);
  setStatus('info','Sprocket is following your code… 🦊');
  await sleep(300);
  const nodes=flatten(program);

  for(let i=0;i<ops.length;i++){
    highlight(nodes[i].id);
    const op=ops[i];
    if(op==='left'){bot.dir=DIRS[(DIRS.indexOf(bot.dir)+3)%4];placeBot(true);}
    else if(op==='right'){bot.dir=DIRS[(DIRS.indexOf(bot.dir)+1)%4];placeBot(true);}
    else if(op==='ifwall'){
      const[dx,dy]=VEC[bot.dir];
      if(isWall(bot.x+dx,bot.y+dy)){bot.dir=DIRS[(DIRS.indexOf(bot.dir)+1)%4];placeBot(true);}
      else { sensorBlink(); }
    }
    else if(op==='move'){
      const[dx,dy]=VEC[bot.dir], nx=bot.x+dx, ny=bot.y+dy;
      if(isWall(nx,ny)){ await bonk(); running=false; lockUI(false); clearHL(); return; }
      bot.x=nx;bot.y=ny; placeBot(true);
      await sleep(420);
      if(tileAt(nx,ny)==='B'){grid[ny][nx]='.'; collect(nx,ny);}
      if(tileAt(nx,ny)==='H'){ await sleep(120); win(); running=false; lockUI(false); clearHL(); return; }
      continue;
    }
    await sleep(430);
  }
  clearHL(); running=false; lockUI(false);
  setStatus('bad','Sprocket didn\u2019t reach home yet. Tweak the code and try again! 🔧');
}

function highlight(id){clearHL();const el=programEl.querySelector(`[data-id="${id}"]`);
  if(el){if(el.classList.contains('loop'))el.querySelector('.loop-head')?.classList?.add('running');
    else el.classList.add('running');}}
function clearHL(){programEl.querySelectorAll('.running').forEach(e=>e.classList.remove('running'));}

async function bonk(){
  setStatus('bad','💥 Bonk! Sprocket bumped into a tree. Check her path!');
  $('botInner').classList.add('bonk');
  await sleep(500);$('botInner').classList.remove('bonk');
}
function sensorBlink(){const s=$('bot');if(s){s.animate([{filter:'drop-shadow(0 0 0 #b58cff)'},
  {filter:'drop-shadow(0 0 10px #b58cff)'},{filter:'none'}],{duration:380});}}
function collect(x,y){
  const tile=board.querySelector(`.tile[data-x="${x}"][data-y="${y}"]`);
  if(tile)tile.innerHTML='';
  const[px,py]=cellPos(x,y);const sp=document.createElement('div');sp.className='spark';
  sp.textContent='✨🔋';sp.style.left=(px+TILE*0.2)+'px';sp.style.top=py+'px';
  board.appendChild(sp);setTimeout(()=>sp.remove(),700);
}

function lockUI(on){
  $('runBtn').disabled=on;$('resetBtn').disabled=on;
  paletteEl.querySelectorAll('.cmd').forEach(b=>b.disabled=on);
  programEl.querySelectorAll('.x,.stepper button,.close-loop').forEach(b=>b.disabled=on);
}
function setStatus(kind,html){const s=$('status');s.className='status '+kind;s.innerHTML=html;}

/* ---------- win ---------- */
function win(){
  won=true;
  setStatus('good','🎉 Sprocket made it home!');
  unlocked=Math.max(unlocked,lvl+1);
  renderChapters();
  const last = lvl===LEVELS.length-1;
  $('winEmoji').textContent = last?'🏆':'🎉';
  $('winTitle').textContent = last?'Master Coder!':'You did it!';
  $('winMsg').innerHTML = last
    ? 'Sprocket is home for good — and you\u2019ve learned the three building blocks of <b>every</b> program!'
    : 'Sprocket is one step closer to her cozy den.';
  $('winLearned').innerHTML = '🧠 You learned that '+LEVELS[lvl].learned;
  $('nextBtn').textContent = last?'Play Again ↺':'Next Chapter →';
  confetti();
  setTimeout(()=>$('overlay').classList.add('show'),650);
}
function confetti(){
  const cols=['#ffb454','#ff7eb6','#4fd1c5','#b58cff','#ffd86b'];
  for(let i=0;i<60;i++){const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';c.style.background=cols[i%cols.length];
    c.style.animationDuration=(1.6+Math.random()*1.6)+'s';c.style.animationDelay=(Math.random()*.5)+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);setTimeout(()=>c.remove(),3400);}
}

/* ---------- chapters nav ---------- */
function renderChapters(){
  const nav=$('chapters');nav.innerHTML='';
  LEVELS.forEach((L,i)=>{
    const c=document.createElement('button');
    const locked=i>unlocked;
    const done=i<unlocked && i!==lvl;
    c.className='chip-ch'+(i===lvl?' active':'')+(locked?' locked':'')+(done?' done':'');
    c.innerHTML=`<span class="num">${i+1}</span> ${L.name}`;
    if(!locked)c.onclick=()=>{ $('overlay').classList.remove('show'); loadLevel(i); };
    nav.appendChild(c);
  });
}

/* ---------- buttons ---------- */
$('runBtn').onclick=run;
$('resetBtn').onclick=()=>{ if(running)return; program=[];activeBlock='main';renderProgram();
  bot={...LEVELS[lvl].start};renderBoard();placeBot(false);
  setStatus('info','Cleared! Build a new plan for Sprocket. 🧩');};
$('hintBtn').onclick=()=>$('hintBox').classList.toggle('show');
$('nextBtn').onclick=()=>{ $('overlay').classList.remove('show');
  loadLevel(lvl<LEVELS.length-1?lvl+1:0); };

window.addEventListener('resize',()=>{ if(!running){computeTile();renderBoard();placeBot(false);} });

/* ---------- go ---------- */
loadLevel(0);
</script>
</body>
